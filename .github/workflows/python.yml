name: ci

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  unittest:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ['3.10', '3.11']

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package
        run: python -m pip install -e .
      - name: Run tests
        run: python -m unittest discover -s tests -v

  build-windows-exe:
    runs-on: windows-latest
    needs: unittest
    if: github.event_name != 'pull_request'
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Build Windows executable bundle
        shell: pwsh
        run: .\scripts\build-exe.ps1
      - name: Upload Windows bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: trae-patch-windows-x64
          path: |
            dist/trae-patch.exe
            dist/trae-patch-windows-x64
            dist/trae-patch-windows-x64.zip
          if-no-files-found: error
          retention-days: 14
      - name: Publish release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/trae-patch-windows-x64.zip
          generate_release_notes: true
